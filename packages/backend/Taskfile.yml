version: "3"

tasks:
  dev:
    desc: Start backend dev server
    cmd: bun --hot src/index.ts

  auth:gen:
    desc: Generate Better Auth schema
    cmd: yarn better-auth generate -y --config src/services/auth/static.ts --output src/services/database/schema/auth.ts

  database:generate:
    desc: Generate Drizzle migrations
    cmd: yarn drizzle-kit generate

  database:migrate:
    desc: Run Drizzle migrations
    cmd: yarn drizzle-kit migrate

  database:push:
    desc: Push schema changes to database
    cmd: yarn drizzle-kit push

  database:studio:
    desc: Open Drizzle Studio
    cmd: yarn drizzle-kit studio

  build:
    desc: Build backend with Rolldown
    cmd: npx rolldown -c

  lint:
    desc: Run ESLint
    cmd: yarn eslint src/

  build:docker:
    desc: Build docker image
    cmd: docker build -f ../../Dockerfile.backend -t elysia-stack/backend ../..
